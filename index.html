<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tarik Bhai | Official Protector 🛡️</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#010205] text-white overflow-hidden h-screen flex flex-col">
    <div id="bg-quotes-container" class="fixed inset-0 z-0 overflow-hidden pointer-events-none"></div>
    <header class="relative z-10 bg-black/80 backdrop-blur-md border-b border-[#FFD700]/20 p-4">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-[#FFD700] flex items-center justify-center text-black text-2xl font-black">T</div>
            <div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">
                    TARIK <span class="text-[#FFD700]">BHAI</span>
                </h1>
                <p class="text-[9px] text-[#FFD700] font-black tracking-widest uppercase opacity-80">
                    <i class="fa-solid fa-shield-halved"></i> Official Protector 🛡️
                </p>
            </div>
        </div>
    </header>
    <main id="chat-canvas" class="flex-1 overflow-y-auto p-4 md:px-24 flex flex-col pt-6 pb-40 relative z-10 custom-scrollbar"></main>
    <div id="thinking" class="hidden relative z-20 px-6 pb-4">
        <div class="flex gap-2">
            <div class="w-2 h-2 bg-[#FFD700] rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-[#FFD700] rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-[#FFD700] rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </div>
    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/90 to-transparent z-30">
        <div class="max-w-4xl mx-auto flex items-center gap-3 bg-white/5 border border-white/10 rounded-full px-5 py-2 backdrop-blur-xl">
            <textarea id="user-input" class="flex-1 bg-transparent border-none outline-none text-white py-2 resize-none h-10" placeholder="Bhai se baat karo..."></textarea>
            <button id="send-btn" class="w-12 h-12 bg-[#FFD700] rounded-full flex items-center justify-center text-black transition-transform active:scale-90">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
